name: Publish Template To Nuget

on:
  push:
    tags:
    - "v[0-9]+.[0-9]+.[0-9]+"

jobs:
  build:
    runs-on: ubuntu-latest
    # Required for OIDC trusted publishing
    permissions:
      id-token: write
      contents: read
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET 10
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Set VERSION variable from tag
      run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_ENV

    - name: Test
      run: dotnet test ./tests/MyTemplates.Tests/MyTemplates.Tests.csproj --configuration Release

    - name: Pack
      run: dotnet pack ./src/templates.csproj --configuration Release /p:Version=${VERSION} --output .

    - name: NuGet login (Trusted Publishing)
      uses: NuGet/login@v1
      id: nuget_login
      with:
        user: ${{ github.repository_owner }}

    - name: Push to NuGet
      run: dotnet nuget push my-templates.${VERSION}.nupkg --source https://api.nuget.org/v3/index.json --api-key ${{ steps.nuget_login.outputs.NUGET_API_KEY }}
